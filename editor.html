<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FramedShot Editor</title>
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="cropper.css">
</head>
<body>
    <div class="app-container">
        <main class="canvas-area">
            <canvas id="editorCanvas"></canvas>
        </main>

        <!-- Mobile Toggle Button -->
        <button id="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar (Tab)">
            <span class="toggle-icon">◀</span>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">FramedShot</h1>
                <button id="closeSidebar" class="close-sidebar-btn" title="Close sidebar">✕</button>
            </div>

            <div class="sidebar-content">
                <div class="control-group" id="bgTypeControl">
                    <label>Background</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-group="bgType" data-value="gradient">Gradient</button>
                        <button class="toggle-btn" data-group="bgType" data-value="solid">Solid</button>
                    </div>
                </div>

                <div class="control-group" id="gradientControls">
                    <label>Style</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-group="style" data-value="linear">Linear</button>
                        <button class="toggle-btn" data-group="style" data-value="radial">Radial</button>
                    </div>
                </div>

                <div class="control-group" id="angleControl">
                    <label>Angle <span class="value-display" id="angleValue">135°</span></label>
                    <input type="range" id="angleRange" min="0" max="360" value="135">
                </div>

                <div class="control-group">
                    <label>Colors</label>
                    <div class="color-picker-row">
                        <div class="color-input-wrapper">
                            <input type="color" id="colorStart" value="#0077B5">
                            <span>Start</span>
                        </div>
                        <div class="color-input-wrapper" id="colorEndWrapper">
                            <input type="color" id="colorEnd" value="#00A0DC">
                            <span>End</span>
                        </div>
                    </div>
                    <div class="preset-row" id="presetRow">
                        <button class="preset-btn" data-start="#4F46E5" data-end="#06B6D4" title="Hyper Blue"></button>
                        <button class="preset-btn" data-start="#0F172A" data-end="#334155" title="Slate Dark"></button>
                        <button class="preset-btn" data-start="#0077B5" data-end="#00A0DC" title="LinkedIn"></button>
                        <button class="preset-btn" data-start="#7C3AED" data-end="#C026D3" title="Unicorn"></button>
                        <button class="preset-btn" data-start="#F59E0B" data-end="#EC4899" title="Sunset"></button>
                        <button class="preset-btn" data-start="#10B981" data-end="#3B82F6" title="Aurora"></button>
                        <button class="preset-btn" data-start="#F43F5E" data-end="#FBBF24" title="Fire"></button>
                        <button class="preset-btn" data-start="#111827" data-end="#000000" title="OLED Black"></button>
                    </div>
                </div>

                <hr class="divider">
                
                <div class="control-group">
                    <label>Aspect Ratio</label>
                    <select id="ratioSelect" class="styled-select">
                        <option value="auto">Auto</option>
                        <option value="1">Square (1:1)</option>
                        <option value="1.777">16:9</option>
                        <option value="0.8">4:5</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Image Size <span class="value-display" id="imageSizeValue">100%</span></label>
                    <input type="range" id="imageSizeRange" min="25" max="100" value="100">
                </div>

                <div class="control-group button-row">
                    <button id="startCropBtn">
                        <span>✂️</span> Crop
                    </button>
                    <button id="resetBtn">
                        <span>↺</span> Reset
                    </button>
                </div>

                <hr class="divider">

                <div class="control-group">
                    <label>Padding <span class="value-display" id="paddingValue">100px</span></label>
                    <input type="range" id="paddingRange" min="0" max="200" value="100">
                </div>

                <div class="control-group">
                    <label>Shadow <span class="value-display" id="shadowValue">50</span></label>
                    <input type="range" id="shadowRange" min="0" max="100" value="50">
                </div>

                <div class="control-group">
                    <label>Roundness <span class="value-display" id="radiusValue">24px</span></label>
                    <input type="range" id="radiusRange" min="0" max="60" value="24">
                </div>

                <hr class="divider">

                <div class="control-group settings-row">
                    <input type="checkbox" id="saveSettingsCheck">
                    <label for="saveSettingsCheck">Save settings for next time</label>
                </div>

                <!-- Sticky Bottom Section -->
                <div class="sidebar-bottom">
                    <!-- Donation Box -->
                    <div class="donate-container" id="donateBox">
                        <button id="closeDonateBtn" class="close-donate-btn" title="Dismiss">✕</button>
                        <p class="donate-text">Enjoy FramedShot? Consider buying me a coffee!</p>
                        <button id="donateBtn" class="btn-donate">
                            <span>☕</span> Donate
                        </button>
                    </div>
                    
                    <!-- Export Buttons -->
                    <div class="export-buttons">
                        <button id="downloadBtn" class="btn-primary">
                            <span>⬇</span> Download
                        </button>
                        <button id="copyBtn" class="btn-secondary">
                            <span>📋</span> Copy
                        </button>
                    </div>
                </div>

            </div>
        </aside>
    </div>

    <div id="cropModal" class="modal-backdrop" style="display:none;">
        <div class="modal-content large-modal">
            <div class="modal-header">
                <h2>Crop Image</h2>
            </div>
            <div class="crop-container">
                <img id="cropTarget" src="" style="max-width: 100%;">
            </div>
            <div class="modal-footer">
                <button id="cancelCropBtn" class="btn-text">Cancel</button>
                <button id="applyCropBtn" class="btn-primary">Apply Crop</button>
            </div>
        </div>
    </div>
    
    <script src="cropper.js"></script>
    <script src="editor.js"></script>
</body>
</html>
